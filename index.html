<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Eviter le cache sur le Chromecast -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <title>Plan de Table Dynamique</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --card-bg-translucent: rgba(15, 23, 42, 0.22); 
            --accent-purple: #8b5cf6;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --text-dark: #1e293b;
            --text-light: #f8fafc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

        body {
            font-family: 'Fredoka', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            position: relative;
        }

        /* En-tête */
        header {
            position: relative;
            z-index: 10;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            padding: 0.6rem 1.8rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--text-light);
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }

        .title-group h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #fef08a 0%, #f59e0b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-controls { display: flex; align-items: center; gap: 15px; }

        .meal-badge {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            padding: 0.4rem 1.2rem;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .admin-btn {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: #fff;
            padding: 0.4rem 1rem;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.1rem;
            transition: background 0.2s;
        }

        .admin-btn:hover { background: rgba(255, 255, 255, 0.3); }

        /* Conteneur principal */
        main { 
            width: 100%; 
            flex: 1; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            position: relative;
            margin: 0.5rem 0;
        }
        
        .dining-room { 
            position: relative; 
            width: 100%; 
            height: 100%; 
            max-width: 1100px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        
        /* Arrière-plan de la table */
        .table-image-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: 1;
        }

        /* STYLES DES ANIMATIONS MASCOTTES AGRANDIES DE +50% (165px) */
        .mascot-video {
            position: absolute;
            z-index: 2;
            width: 165px;  /* 110px + 50% */
            height: 165px; /* 110px + 50% */
            object-fit: cover;
            filter: none;
            pointer-events: none;
            background: transparent;
        }

        /* Mascotte Brocoli à gauche */
        .mascot-left {
            left: -2%;
            top: 50%;
            transform: translateY(-50%);
        }

        /* Mascotte Carotte à droite */
        .mascot-right {
            right: -2%;
            top: 50%;
            transform: translateY(-50%);
        }

        /* Inscription centrale */
        .table-centerpiece { 
            position: absolute;
            z-index: 3;
            font-size: 2.3rem; 
            color: #ffffff; 
            text-shadow: 0 4px 10px rgba(0,0,0,0.8);
            text-align: center; 
            font-weight: 700; 
            background: rgba(15, 23, 42, 0.65);
            padding: 0.4rem 1.8rem;
            border-radius: 30px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.25);
        }

        /* Cartes des 6 places */
        .seat {
            position: absolute;
            z-index: 5;
            width: 130px;
            transition: all 0.5s ease;
        }

        .seat-pos-1 { left: 17%; top: 48%; transform: translateY(-50%); }         /* Mauro */
        .seat-pos-2 { top: 3%; left: 30%; }                                       /* Victor */
        .seat-pos-3 { top: 3%; right: 42%; }                                      /* Jaime */
        .seat-pos-4 { right: 17%; top: 48%; transform: translateY(-50%); }        /* Emma */
        .seat-pos-5 { bottom: 3%; right: 30%; }                                   /* Violeta */
        .seat-pos-6 { bottom: 3%; left: 30%; }                                    /* Chloé */

        /* Carte translucide */
        .seat-card {
            background: var(--card-bg-translucent);
            backdrop-filter: blur(6px);
            border-radius: 16px;
            padding: 0.4rem 0.5rem 0.5rem 0.5rem;
            width: 100%;
            display: flex; 
            flex-direction: column; 
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.35);
            box-shadow: 0 6px 16px rgba(0,0,0,0.25);
        }

        .seat-label {
            font-size: 0.65rem; 
            color: #f59e0b; 
            text-transform: uppercase;
            letter-spacing: 0.5px; 
            margin-bottom: 3px; 
            font-weight: bold; 
            text-align: center;
            line-height: 1.1;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        }

        .avatar-circle {
            width: 56px; 
            height: 56px; 
            border-radius: 50%;
            background: #334155; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            font-size: 2rem; 
            margin-bottom: 0.2rem;
            border: 2px solid rgba(255,255,255,0.9);
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            overflow: hidden;
        }

        .avatar-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .kid-name { 
            font-size: 1.05rem; 
            font-weight: 700; 
            text-align: center; 
            color: #ffffff;
            text-shadow: 0 2px 5px rgba(0,0,0,0.9);
        }

        /* MODAL ADMIN */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(8px);
            z-index: 100; display: none; justify-content: center; align-items: center;
            color: var(--text-light);
        }

        .modal-card {
            background: #1e293b; border-radius: 24px; padding: 2rem; width: 90%; max-width: 600px;
            border: 1px solid rgba(255,255,255,0.2); max-height: 85vh; overflow-y: auto;
        }

        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .modal-header h2 { font-size: 1.8rem; color: #f59e0b; }
        .close-btn { background: none; border: none; color: #fff; font-size: 1.8rem; cursor: pointer; }

        .admin-section { margin-bottom: 1.5rem; }
        .admin-section h3 { font-size: 1.1rem; margin-bottom: 0.8rem; color: #94a3b8; }

        .kid-item {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.05); padding: 0.8rem 1rem; border-radius: 12px; margin-bottom: 8px;
        }

        .toggle-checkbox { width: 22px; height: 22px; cursor: pointer; }

        .add-form { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        .add-form-row { display: flex; gap: 10px; }
        .add-form input {
            flex: 1; padding: 0.6rem 1rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2);
            background: #0f172a; color: #fff; font-family: inherit;
        }

        .btn-action {
            background: var(--accent-blue); color: #fff; border: none; padding: 0.6rem 1.2rem;
            border-radius: 8px; font-weight: bold; cursor: pointer;
        }

        footer { 
            font-size: 0.95rem; 
            color: #334155; 
            font-weight: 600;
            width: 100%; 
            text-align: center; 
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <div class="title-group">
            <h1>🍽️ ¿Dónde me siento?</h1>
        </div>
        <div class="header-controls">
            <div class="meal-badge" id="mealBadge">☀️ Comida</div>
            <div class="time-display" id="timeDisplay" style="font-size:1.4rem;">14:00</div>
            <button class="admin-btn" onclick="openAdmin()">⚙️ Gestión</button>
        </div>
    </header>

    <!-- Table & Sièges -->
    <main>
        <div class="dining-room">
            <!-- Vraie photo de la table -->
            <img src="Table.png" alt="Table" class="table-image-bg">
            
            <!-- Vidéo Brocoli à gauche -->
            <video class="mascot-video mascot-left" autoplay loop muted playsinline>
                <source src="BrocoliKid.mp4" type="video/mp4">
            </video>

            <!-- Vidéo Carotte à droite -->
            <video class="mascot-video mascot-right" autoplay loop muted playsinline>
                <source src="CarrotKid.mp4" type="video/mp4">
            </video>

            <!-- Inscription centrale -->
            <div class="table-centerpiece">¡Bon appétit! 🥗</div>

            <!-- Conteneur des sièges superposés -->
            <div id="seatsContainer">
                <!-- Les 6 places -->
            </div>
        </div>
    </main>

    <footer id="nextRotationInfo">
        Próximo cambio: Cena a las 19h00
    </footer>

    <!-- MODAL ADMIN -->
    <div class="modal-overlay" id="adminModal">
        <div class="modal-card">
            <div class="modal-header">
                <h2>⚙️ Panel de Gestión</h2>
                <button class="close-btn" onclick="closeAdmin()">&times;</button>
            </div>

            <div class="admin-section">
                <h3>Niños presentes en la mesa</h3>
                <div id="kidsAdminList"></div>
            </div>

            <div class="admin-section">
                <h3>Añadir invitado o niño</h3>
                <div class="add-form">
                    <div class="add-form-row">
                        <input type="text" id="newKidName" placeholder="Nombre...">
                        <input type="text" id="newKidEmoji" placeholder="Emoji (ej: 👦)" style="width: 90px;">
                    </div>
                    <input type="text" id="newKidPhoto" placeholder="Nombre del archivo (ej: foto.png)">
                    <button class="btn-action" onclick="addKid()">Añadir a la mesa</button>
                </div>
            </div>

            <div style="margin-top:2rem; text-align:right;">
                <button class="btn-action" style="background:#10b981;" onclick="closeAdmin()">Guardar y cerrar</button>
            </div>
        </div>
    </div>

    <script>
        const PLACES_CONFIG = [
            { id: 1, label: "Silla Izquierda", posClass: "seat-pos-1" },
            { id: 2, label: "Sillón Arriba-Izq", posClass: "seat-pos-2" },
            { id: 3, label: "Silla Arriba-Der", posClass: "seat-pos-3" },
            { id: 4, label: "Sillón Derecho", posClass: "seat-pos-4" },
            { id: 5, label: "Silla Abajo-Der", posClass: "seat-pos-5" },
            { id: 6, label: "Silla Abajo-Izq", posClass: "seat-pos-6" }
        ];

        const DEFAULT_KIDS = [
            { id: '1', name: 'Emma', avatar: '👧', photo: 'emma.png', active: true },
            { id: '2', name: 'Violeta', avatar: '👧', photo: 'Vivi.png', active: true },
            { id: '3', name: 'Chloé', avatar: '🧒', photo: 'Chloé.png', active: true },
            { id: '4', name: 'Mauro', avatar: '👦', photo: 'Mauro.png', active: true },
            { id: '5', name: 'Victor', avatar: '👦', photo: 'Victor.png', active: true },
            { id: '6', name: 'Jaime', avatar: '🧒', photo: 'Jaime.png', active: true }
        ];

        const ANCHOR_DATE = new Date("2026-07-01T00:00:00");

        function getKids() {
            const saved = localStorage.getItem('table_kids');
            return saved ? JSON.parse(saved) : DEFAULT_KIDS;
        }

        function saveKids(kids) {
            localStorage.setItem('table_kids', JSON.stringify(kids));
            updateUI();
        }

        function calculateSeating() {
            const now = new Date();
            const hour = now.getHours();
            const isDinner = hour < 19; // < 19h = Comida, >= 19h = Cena
            
            const diffTime = now.getTime() - ANCHOR_DATE.getTime();
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            const totalMealCount = (diffDays * 2) + (isDinner ? 0 : 1);

            const allKids = getKids();
            const activeKids = allKids.filter(k => k.active);

            const assignments = [];
            const count = activeKids.length;

            if (count > 0) {
                for (let i = 0; i < Math.min(count, PLACES_CONFIG.length); i++) {
                    const kidIndex = (i - (totalMealCount % count) + count) % count;
                    assignments.push({
                        kid: activeKids[kidIndex],
                        place: PLACES_CONFIG[i]
                    });
                }
            }

            return { isDinner, assignments };
        }

        function updateUI() {
            const now = new Date();
            document.getElementById('timeDisplay').textContent = 
                `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

            const seating = calculateSeating();
            document.getElementById('mealBadge').textContent = seating.isDinner ? "☀️ Comida" : "🌙 Cena";

            const nextInfo = seating.isDinner 
                ? "Próximo cambio: Cena a partir de las 19h00" 
                : "Próximo cambio: Comida mañana a mediodía";
            document.getElementById('nextRotationInfo').textContent = nextInfo;

            const container = document.getElementById('seatsContainer');
            container.innerHTML = '';

            if (seating.assignments.length === 0) {
                container.innerHTML = '<div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:1.5rem; color:#94a3b8; background:rgba(0,0,0,0.8); padding:1rem 2rem; border-radius:12px;">No hay niños seleccionados en la mesa.</div>';
                return;
            }

            seating.assignments.forEach(item => {
                const seatElem = document.createElement('div');
                seatElem.className = `seat ${item.place.posClass}`;

                const avatarHTML = (item.kid.photo && item.kid.photo.trim() !== '') 
                    ? `<img src="${item.kid.photo}" alt="${item.kid.name}">` 
                    : item.kid.avatar;

                seatElem.innerHTML = `
                    <div class="seat-card">
                        <div class="seat-label">${item.place.label}</div>
                        <div class="avatar-circle">${avatarHTML}</div>
                        <div class="kid-name">${item.kid.name}</div>
                    </div>
                `;
                container.appendChild(seatElem);
            });
        }

        function openAdmin() {
            renderAdminKids();
            document.getElementById('adminModal').style.display = 'flex';
        }

        function closeAdmin() {
            document.getElementById('adminModal').style.display = 'none';
            updateUI();
        }

        function renderAdminKids() {
            const kids = getKids();
            const list = document.getElementById('kidsAdminList');
            list.innerHTML = '';

            kids.forEach(kid => {
                const item = document.createElement('div');
                item.className = 'kid-item';
                const icon = (kid.photo && kid.photo.trim() !== '') ? '🖼️' : kid.avatar;
                
                item.innerHTML = `
                    <div>
                        <span style="font-size:1.3rem; margin-right:8px;">${icon}</span>
                        <strong>${kid.name}</strong>
                    </div>
                    <input type="checkbox" class="toggle-checkbox" ${kid.active ? 'checked' : ''} onchange="toggleKid('${kid.id}')">
                `;
                list.appendChild(item);
            });
        }

        function toggleKid(id) {
            const kids = getKids();
            const kid = kids.find(k => k.id === id);
            if (kid) {
                kid.active = !kid.active;
                saveKids(kids);
                renderAdminKids();
            }
        }

        function addKid() {
            const name = document.getElementById('newKidName').value.trim();
            const emoji = document.getElementById('newKidEmoji').value.trim() || '👶';
            const photo = document.getElementById('newKidPhoto').value.trim();

            if (name) {
                const kids = getKids();
                kids.push({ id: Date.now().toString(), name, avatar: emoji, photo: photo, active: true });
                saveKids(kids);
                document.getElementById('newKidName').value = '';
                document.getElementById('newKidEmoji').value = '';
                document.getElementById('newKidPhoto').value = '';
                renderAdminKids();
            }
        }

        updateUI();
        setInterval(updateUI, 10000);
    </script>
</body>
</html>
